<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat - Agent Enterprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --canvas: #F5F7FB;
    --surface: rgba(255, 255, 255, 0.96);
    --surface-alt: rgba(255, 255, 255, 0.78);
    --border: rgba(148, 163, 184, 0.22);
    --border-strong: rgba(37, 99, 235, 0.22);
    --shell: #0F172A;
    --shell-soft: #1E293B;
    --text: #0F172A;
    --muted: #64748B;
    --subtle: #94A3B8;
    --accent: #2563EB;
    --accent-soft: rgba(37, 99, 235, 0.12);
    --success: #15803D;
    --warning: #C2410C;
    --danger: #DC2626;
    --font-ui: "Plus Jakarta Sans", sans-serif;
    --font-data: "JetBrains Mono", monospace;
    --shadow-lg: 0 24px 50px rgba(15, 23, 42, 0.08);
    --shadow-md: 0 16px 28px rgba(15, 23, 42, 0.06);
  }

  html, body { height: 100%; background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 26%), linear-gradient(180deg, #F8FAFC 0%, #EEF2FF 100%); color: var(--text); font-family: var(--font-ui); }
  body { overflow: hidden; }

  .app {
    height: 100vh;
    display: grid;
    grid-template-columns: 56px minmax(0, 1fr);
  }

  .nav-rail {
    background: var(--shell);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 6px;
  }

  .chat-shell {
    min-width: 0;
    min-height: 0;
    padding: 22px;
  }

  .chat-root {
    width: 100%;
    height: 100%;
    min-height: 0;
  }

  .loading-state,
  .error-state,
  .empty-state {
    height: 100%;
    display: grid;
    place-items: center;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    padding: 32px;
    background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.6));
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
  }

  .launcher-view {
    display: flex;
    flex-direction: column;
    gap: 18px;
    height: 100%;
    min-height: 0;
  }

  .hero-card,
  .workspace-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.78));
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(16px);
  }

  .hero-card {
    padding: 22px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .hero-title {
    font-size: 34px;
    line-height: 1;
    margin-top: 8px;
  }

  .hero-copy {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    max-width: 760px;
    margin-top: 10px;
  }

  .hero-metrics {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .metric-pill {
    min-width: 132px;
    padding: 14px 16px;
    background: rgba(15, 23, 42, 0.04);
    border: 1px solid rgba(148, 163, 184, 0.14);
    border-radius: 18px;
  }

  .metric-pill strong {
    display: block;
    font-size: 24px;
    line-height: 1;
  }

  .metric-pill span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  .launcher-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 4px;
  }

  .search-shell {
    flex: 1;
    max-width: 340px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    height: 48px;
    background: rgba(255,255,255,0.86);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .search-shell input {
    width: 100%;
    border: 0;
    outline: none;
    background: transparent;
    color: var(--text);
    font: inherit;
  }

  .toolbar-note {
    color: var(--muted);
    font-size: 13px;
  }

  .agent-grid {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    overflow-y: auto;
    padding: 4px;
  }

  .agent-card {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 18px;
    text-decoration: none;
    color: inherit;
    background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,250,252,0.92));
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: var(--shadow-md);
    transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
  }

  .agent-card:hover {
    transform: translateY(-2px);
    border-color: var(--border-strong);
    box-shadow: 0 24px 40px rgba(37, 99, 235, 0.12);
  }

  .card-head,
  .session-row,
  .message-head,
  .context-row,
  .task-chip,
  .toolbar-actions,
  .workspace-topbar,
  .workspace-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 52px;
    height: 52px;
    border-radius: 18px;
    border: 1px solid rgba(148, 163, 184, 0.18);
    background: white center / cover no-repeat;
    flex-shrink: 0;
  }

  .avatar-sm {
    width: 38px;
    height: 38px;
    border-radius: 14px;
  }

  .agent-card h2,
  .workspace-agent h1 {
    font-size: 18px;
    line-height: 1.2;
  }

  .role-copy,
  .session-preview,
  .message-body,
  .context-copy,
  .task-summary {
    color: var(--muted);
    line-height: 1.65;
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 30px;
    padding: 0 12px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.05);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .badge[data-tone="accent"] {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .badge[data-tone="warning"] {
    background: rgba(194, 65, 12, 0.12);
    color: var(--warning);
  }

  .workspace-view {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr) 320px;
    gap: 18px;
    height: 100%;
    min-height: 0;
  }

  .workspace-card {
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .workspace-sidebar,
  .workspace-main,
  .workspace-context {
    min-height: 0;
  }

  .workspace-sidebar {
    padding: 18px;
    gap: 18px;
  }

  .workspace-agent {
    display: grid;
    gap: 10px;
  }

  .workspace-copy {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }

  .input-group,
  .session-picker,
  .model-picker {
    display: grid;
    gap: 10px;
  }

  .field-label {
    color: var(--subtle);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .text-input,
  .select-input,
  .composer textarea {
    width: 100%;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(255,255,255,0.92);
    color: var(--text);
    outline: none;
    font: inherit;
    border-radius: 14px;
  }

  .text-input,
  .select-input {
    height: 44px;
    padding: 0 14px;
  }

  .session-list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .skill-picker {
    display: grid;
    gap: 10px;
    padding: 14px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.03);
  }

  .skill-picker-head {
    align-items: flex-start;
    justify-content: space-between;
  }

  .skill-caption {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
    margin-top: 6px;
  }

  .skill-search {
    height: 40px;
  }

  .skill-badges {
    margin-top: 8px;
  }

  .skill-option-list {
    max-height: 220px;
    overflow-y: auto;
    display: grid;
    gap: 8px;
    padding-right: 4px;
  }

  .skill-option {
    display: grid;
    grid-template-columns: 18px minmax(0, 1fr);
    gap: 10px;
    align-items: flex-start;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    background: rgba(255,255,255,0.84);
  }

  .skill-option input {
    margin-top: 2px;
  }

  .skill-option-copy {
    display: grid;
    gap: 4px;
  }

  .skill-option-title {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
  }

  .skill-option-description {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .skill-empty {
    min-height: 120px;
  }

  .session-link {
    display: block;
    text-decoration: none;
    color: inherit;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 18px;
    padding: 14px;
    background: rgba(255,255,255,0.84);
  }

  .session-link.active {
    border-color: rgba(37, 99, 235, 0.28);
    box-shadow: 0 18px 32px rgba(37, 99, 235, 0.1);
  }

  .session-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.35;
  }

  .session-meta,
  .message-meta,
  .context-note,
  .task-meta {
    color: var(--subtle);
    font-size: 12px;
    line-height: 1.5;
  }

  .workspace-main {
    padding: 18px;
  }

  .workspace-main-inner {
    min-height: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .workspace-topbar {
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .workspace-title {
    font-size: 28px;
    line-height: 1.05;
    margin-top: 6px;
  }

  .topbar-copy {
    color: var(--muted);
    margin-top: 8px;
    font-size: 14px;
  }

  .toolbar-actions {
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 42px;
    padding: 0 16px;
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.2);
    background: rgba(255,255,255,0.92);
    color: var(--text);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .action-btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .action-btn-danger {
    color: var(--danger);
    border-color: rgba(220, 38, 38, 0.22);
  }

  .action-btn:disabled {
    opacity: 0.6;
    cursor: wait;
  }

  .notice {
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid rgba(37, 99, 235, 0.18);
    background: rgba(37, 99, 235, 0.08);
    color: #1D4ED8;
    font-size: 13px;
    line-height: 1.6;
  }

  .notice[data-tone="warning"] {
    border-color: rgba(194, 65, 12, 0.18);
    background: rgba(194, 65, 12, 0.08);
    color: var(--warning);
  }

  .notice[data-tone="danger"] {
    border-color: rgba(220, 38, 38, 0.18);
    background: rgba(220, 38, 38, 0.08);
    color: var(--danger);
  }

  .task-card {
    display: grid;
    gap: 10px;
    padding: 16px;
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.03);
    border: 1px solid rgba(148, 163, 184, 0.16);
  }

  .messages-panel {
    flex: 1;
    min-height: 0;
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,252,0.88));
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .messages-stream {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .message-card {
    padding: 14px 16px;
    border-radius: 20px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    background: rgba(255,255,255,0.9);
  }

  .message-card[data-author="agent"] {
    border-color: rgba(37, 99, 235, 0.16);
    background: rgba(239, 246, 255, 0.9);
  }

  .message-card[data-author="system"] {
    background: rgba(15, 23, 42, 0.04);
  }

  .message-author {
    font-size: 13px;
    font-weight: 700;
  }

  .message-kind {
    color: var(--accent);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .composer {
    padding: 16px;
    border-top: 1px solid rgba(148, 163, 184, 0.18);
    display: grid;
    gap: 12px;
    background: rgba(255,255,255,0.84);
  }

  .composer textarea {
    min-height: 112px;
    resize: vertical;
    padding: 14px;
    line-height: 1.6;
  }

  .composer-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .composer-meta {
    color: var(--muted);
    font-size: 12px;
  }

  .workspace-context {
    padding: 18px;
    gap: 18px;
  }

  .context-block {
    display: grid;
    gap: 10px;
    padding: 16px;
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 20px;
    background: rgba(255,255,255,0.84);
  }

  .context-title {
    font-size: 15px;
    font-weight: 700;
  }

  .context-meter {
    height: 12px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.08);
    overflow: hidden;
  }

  .context-meter span {
    display: block;
    height: 100%;
    background: linear-gradient(90deg, #2563EB 0%, #7C3AED 100%);
    border-radius: 999px;
  }

  .context-grid {
    display: grid;
    gap: 10px;
  }

  .context-row {
    justify-content: space-between;
  }

  .context-row strong {
    font-family: var(--font-data);
    font-size: 12px;
  }

  .inline-error {
    color: var(--danger);
    font-size: 13px;
  }

  .subtle-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
  }

  @media (max-width: 1320px) {
    .workspace-view { grid-template-columns: 300px minmax(0, 1fr); }
    .workspace-context { grid-column: 1 / -1; }
  }

  @media (max-width: 980px) {
    body { overflow: auto; }
    .app { grid-template-columns: 56px minmax(0, 1fr); min-height: 100vh; height: auto; }
    .chat-shell { padding: 14px; }
    .workspace-view { grid-template-columns: 1fr; height: auto; }
    .hero-card { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app">
  <nav class="nav-rail" data-dashboard-rail></nav>
  <main class="chat-shell">
    <div id="chatRoot" class="chat-root">
      <div class="loading-state">Loading agent chat workspaces for Agent-scoped chat sessions…</div>
    </div>
  </main>
</div>

<script type="module" src="/assets/dashboard-rail.js"></script>
<script type="module" src="/assets/chat.js"></script>
</body>
</html>
