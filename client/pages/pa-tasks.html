<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PA — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #0F766E;
      --accent-light: #14B8A6;
      --accent-hover: #0D6B64;
      --shell: #134E4A;
      --shell-dark: #0D3B37;
      --surface-tint: #F0FDFA;
      --canvas: #F8FAFC;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --sidebar-width: 240px;
      --radius: 20px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--canvas);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      min-height: 100vh;
      background: var(--shell);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 28px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-logo span {
      font-size: 18px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }

    .sidebar-logo small {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
      font-weight: 400;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 10px;
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }

    .sidebar-nav a:hover {
      background: rgba(255,255,255,0.08);
      color: #FFFFFF;
    }

    .sidebar-nav a.active {
      background: rgba(20,184,166,0.18);
      color: #FFFFFF;
    }

    .sidebar-nav a .icon {
      width: 18px;
      height: 18px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .sidebar-nav a.active .icon { opacity: 1; }

    .nav-badge {
      margin-left: auto;
      background: var(--accent-light);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 8px 12px;
    }

    .sidebar-back {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-back a {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 12.5px;
      padding: 8px 12px;
      border-radius: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .sidebar-back a:hover {
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.06);
    }

    /* ── Main ── */
    .main {
      flex: 1;
      overflow-x: hidden;
      min-width: 0;
    }

    .page-header {
      padding: 40px 40px 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }

    .page-header-left .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: #F1F5F9; }

    .btn-danger {
      background: #FEE2E2;
      color: #DC2626;
      border: none;
    }

    .btn-danger:hover { background: #FECACA; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 20px 40px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-pills {
      display: flex;
      gap: 6px;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .pill.active, .pill:hover {
      background: var(--surface-tint);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Kanban ── */
    .kanban {
      padding: 24px 40px 48px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      align-items: start;
    }

    .kanban-col {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .kanban-col-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .col-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-dot-todo { background: #3B82F6; }
    .col-dot-inprogress { background: #F59E0B; }
    .col-dot-done { background: #10B981; }

    .col-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text-primary);
      flex: 1;
    }

    .col-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      background: #F1F5F9;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .kanban-cards {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 80px;
    }

    .task-card {
      background: #FAFAFA;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow 0.15s;
    }

    .task-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.07); }

    .task-card-top {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .task-title {
      flex: 1;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .priority-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .priority-high { background: #FEE2E2; color: #DC2626; }
    .priority-medium { background: #FEF3C7; color: #D97706; }
    .priority-low { background: #DCFCE7; color: #16A34A; }

    .task-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .task-due {
      font-size: 11.5px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .task-btn {
      padding: 4px 10px;
      border-radius: 7px;
      font-size: 11.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      transition: all 0.12s;
    }

    .task-btn:hover { background: var(--surface-tint); border-color: var(--accent); color: var(--accent); }

    .task-btn-danger { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }
    .task-btn-danger:hover { background: #FEE2E2; border-color: #FCA5A5; color: #B91C1C; }

    .task-btn-action { background: var(--surface-tint); color: var(--accent); border-color: var(--accent-light); }
    .task-btn-action:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    .empty-col {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12.5px;
    }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .modal-header {
      padding: 22px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 6px;
      transition: color 0.12s, background 0.12s;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text-primary); background: #F1F5F9; }

    .modal-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--canvas);
      transition: border-color 0.15s;
      outline: none;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .form-textarea { resize: vertical; min-height: 80px; }

    .modal-footer {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text-primary);
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 13.5px;
      font-weight: 500;
      z-index: 200;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span>Personal Assistant</span>
    <small>Command Center</small>
  </div>

  <nav class="sidebar-nav">
    <a href="/pa">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="/pa/tasks" class="active">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Tasks
      <span class="nav-badge" id="nav-tasks-badge">0</span>
    </a>
    <a href="/pa/calendar">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendar
    </a>
    <a href="/pa/email">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      Email
    </a>
    <a href="/pa/social">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
      Social
    </a>
    <a href="/pa/fitness">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      Fitness
    </a>
    <div class="sidebar-divider"></div>
  </nav>

  <div class="sidebar-back">
    <a href="/">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Home
    </a>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">
  <div class="page-header">
    <div class="page-header-left">
      <p class="eyebrow">Personal Assistant</p>
      <h1 class="page-title">Task Manager</h1>
    </div>
    <button class="btn btn-primary" id="new-task-btn">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      New task
    </button>
  </div>

  <div class="toolbar">
    <div class="filter-pills">
      <span class="pill active" data-filter="all">All</span>
      <span class="pill" data-filter="todo">Todo</span>
      <span class="pill" data-filter="in_progress">In Progress</span>
      <span class="pill" data-filter="done">Done</span>
    </div>
  </div>

  <div class="kanban">
    <div class="kanban-col" id="col-todo">
      <div class="kanban-col-header">
        <span class="col-dot col-dot-todo"></span>
        <span class="col-title">Todo</span>
        <span class="col-count" id="count-todo">0</span>
      </div>
      <div class="kanban-cards" id="cards-todo"></div>
    </div>

    <div class="kanban-col" id="col-in-progress">
      <div class="kanban-col-header">
        <span class="col-dot col-dot-inprogress"></span>
        <span class="col-title">In Progress</span>
        <span class="col-count" id="count-in-progress">0</span>
      </div>
      <div class="kanban-cards" id="cards-in_progress"></div>
    </div>

    <div class="kanban-col" id="col-done">
      <div class="kanban-col-header">
        <span class="col-dot col-dot-done"></span>
        <span class="col-title">Done</span>
        <span class="col-count" id="count-done">0</span>
      </div>
      <div class="kanban-cards" id="cards-done"></div>
    </div>
  </div>
</main>

<!-- ── Modal ── -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Task</span>
      <button class="modal-close" id="modal-close-btn" aria-label="Close">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-task-id" value="" />
      <div class="form-group">
        <label class="form-label" for="field-title">Title</label>
        <input class="form-input" id="field-title" type="text" placeholder="Task title" />
      </div>
      <div class="form-group">
        <label class="form-label" for="field-desc">Description</label>
        <textarea class="form-textarea" id="field-desc" placeholder="Optional description..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label" for="field-status">Status</label>
          <select class="form-select" id="field-status">
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-priority">Priority</label>
          <select class="form-select" id="field-priority">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="field-due">Due Date</label>
        <input class="form-input" id="field-due" type="date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save Task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allTasks = [];
  let activeFilter = 'all';
  let editingId = null;

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showToast(msg, duration = 2800) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function prioBadge(p) {
    const cls = p === 'high' ? 'priority-high' : p === 'low' ? 'priority-low' : 'priority-medium';
    return `<span class="priority-badge ${cls}">${escHtml(p || 'medium')}</span>`;
  }

  function nextAction(status) {
    if (status === 'todo') return { label: 'Start', next: 'in_progress' };
    if (status === 'in_progress') return { label: 'Complete', next: 'done' };
    return null;
  }

  function renderBoard() {
    const groups = { todo: [], in_progress: [], done: [] };
    allTasks.forEach(t => {
      if (activeFilter !== 'all' && t.status !== activeFilter) return;
      const key = t.status === 'in_progress' ? 'in_progress' : t.status;
      if (groups[key]) groups[key].push(t);
    });

    ['todo', 'in_progress', 'done'].forEach(status => {
      const listEl = document.getElementById('cards-' + status);
      const countEl = document.getElementById('count-' + status.replace('_','-'));
      const tasks = groups[status];
      countEl.textContent = tasks.length;

      if (tasks.length === 0) {
        listEl.innerHTML = '<div class="empty-col">No tasks here.</div>';
        return;
      }

      listEl.innerHTML = tasks.map(t => {
        const na = nextAction(t.status);
        const actionBtn = na ? `<button class="task-btn task-btn-action" data-id="${t.id}" data-action="advance" data-next="${na.next}">${na.label}</button>` : '';
        const dueHtml = t.due_date ? `<div class="task-due"><svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${escHtml(t.due_date)}</div>` : '';
        const descHtml = t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : '';
        return `<div class="task-card" data-id="${t.id}">
          <div class="task-card-top">
            <div class="task-title">${escHtml(t.title)}</div>
            ${prioBadge(t.priority)}
          </div>
          ${descHtml}
          ${dueHtml}
          <div class="task-actions">
            ${actionBtn}
            <button class="task-btn" data-id="${t.id}" data-action="edit">Edit</button>
            <button class="task-btn task-btn-danger" data-id="${t.id}" data-action="delete">Delete</button>
          </div>
        </div>`;
      }).join('');
    });

    const todoCount = allTasks.filter(t => t.status === 'todo').length;
    document.getElementById('nav-tasks-badge').textContent = todoCount;
  }

  async function loadTasks() {
    try {
      const res = await fetch('/api/pa/tasks');
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      allTasks = data.entries || [];
      renderBoard();
    } catch(e) {
      ['todo','in_progress','done'].forEach(s => {
        const el = document.getElementById('cards-' + s);
        if (el) el.innerHTML = '<div class="empty-col">Could not load tasks.</div>';
      });
    }
  }

  async function advanceTask(id, nextStatus) {
    try {
      const res = await fetch(`/api/pa/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: nextStatus })
      });
      if (!res.ok) throw new Error();
      const json = await res.json();
      allTasks = allTasks.map(t => t.id === id ? (json.task || json) : t);
      renderBoard();
      showToast('Task updated.');
    } catch(e) { showToast('Failed to update task.'); }
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try {
      const res = await fetch(`/api/pa/tasks/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      allTasks = allTasks.filter(t => t.id !== id);
      renderBoard();
      showToast('Task deleted.');
    } catch(e) { showToast('Failed to delete task.'); }
  }

  function openModal(task) {
    editingId = task ? task.id : null;
    document.getElementById('modal-title').textContent = task ? 'Edit Task' : 'New Task';
    document.getElementById('modal-task-id').value = task ? task.id : '';
    document.getElementById('field-title').value = task ? task.title : '';
    document.getElementById('field-desc').value = task ? (task.description || '') : '';
    document.getElementById('field-status').value = task ? task.status : 'todo';
    document.getElementById('field-priority').value = task ? (task.priority || 'medium') : 'medium';
    document.getElementById('field-due').value = task ? (task.due_date || '') : '';
    document.getElementById('task-modal').classList.add('open');
    document.getElementById('field-title').focus();
  }

  function closeModal() {
    document.getElementById('task-modal').classList.remove('open');
    editingId = null;
  }

  async function saveTask() {
    const title = document.getElementById('field-title').value.trim();
    if (!title) { document.getElementById('field-title').focus(); return; }
    const payload = {
      title,
      description: document.getElementById('field-desc').value.trim(),
      status: document.getElementById('field-status').value,
      priority: document.getElementById('field-priority').value,
      due_date: document.getElementById('field-due').value || null
    };

    try {
      let res, updated;
      if (editingId) {
        res = await fetch(`/api/pa/tasks/${editingId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error();
        const json1 = await res.json();
        updated = json1.task || json1;
        allTasks = allTasks.map(t => t.id === editingId ? updated : t);
      } else {
        res = await fetch('/api/pa/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error();
        const json2 = await res.json();
        updated = json2.task || json2;
        allTasks.unshift(updated);
      }
      renderBoard();
      closeModal();
      showToast(editingId ? 'Task updated.' : 'Task created.');
    } catch(e) { showToast('Failed to save task.'); }
  }

  // Event delegation on kanban
  document.querySelector('.kanban').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    const task = allTasks.find(t => String(t.id) === String(id));
    if (action === 'advance') advanceTask(id, btn.dataset.next);
    else if (action === 'edit') openModal(task);
    else if (action === 'delete') deleteTask(id);
  });

  // Filter pills
  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      p.classList.add('active');
      activeFilter = p.dataset.filter;
      renderBoard();
    });
  });

  document.getElementById('new-task-btn').addEventListener('click', () => openModal(null));
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-save-btn').addEventListener('click', saveTask);
  document.getElementById('task-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadTasks();
</script>
</body>
</html>
