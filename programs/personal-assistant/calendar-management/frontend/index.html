<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PA — Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #0F766E;
      --accent-light: #14B8A6;
      --accent-hover: #0D6B64;
      --shell: #134E4A;
      --surface-tint: #F0FDFA;
      --canvas: #F8FAFC;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-muted: #94A3B8;
      --sidebar-width: 240px;
      --radius: 20px;
      --radius-sm: 10px;
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--canvas); color: var(--text-primary); display: flex; min-height: 100vh; }

    .sidebar { width: var(--sidebar-width); min-height: 100vh; background: var(--shell); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; }
    .sidebar-logo { padding: 28px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sidebar-logo span { font-size: 18px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.3px; }
    .sidebar-logo small { display: block; font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; font-weight: 400; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 13.5px; font-weight: 500; transition: background 0.15s, color 0.15s; }
    .sidebar-nav a:hover { background: rgba(255,255,255,0.08); color: #FFFFFF; }
    .sidebar-nav a.active { background: rgba(20,184,166,0.18); color: #FFFFFF; }
    .sidebar-nav a .icon { width: 18px; height: 18px; opacity: 0.8; flex-shrink: 0; }
    .sidebar-nav a.active .icon { opacity: 1; }
    .nav-badge { margin-left: auto; background: var(--accent-light); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; min-width: 18px; text-align: center; }
    .sidebar-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 12px; }
    .sidebar-back { padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    .sidebar-back a { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.45); text-decoration: none; font-size: 12.5px; padding: 8px 12px; border-radius: 8px; transition: color 0.15s, background 0.15s; }
    .sidebar-back a:hover { color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.06); }

    .main { flex: 1; overflow-x: hidden; min-width: 0; }
    .page-header { padding: 40px 40px 0; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
    .page-content { padding: 28px 40px 48px; display: flex; flex-direction: column; gap: 28px; }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600; font-family: inherit; cursor: pointer; border: none; transition: background 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: #F1F5F9; }
    .btn-icon { padding: 8px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: background 0.12s; }
    .btn-icon:hover { background: var(--surface-tint); color: var(--accent); }

    .cal-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .cal-nav { padding: 18px 22px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .cal-month-label { flex: 1; font-size: 16px; font-weight: 700; color: var(--text-primary); text-align: center; }
    .cal-grid { width: 100%; border-collapse: collapse; }
    .cal-grid th { padding: 10px 4px 8px; font-size: 11.5px; font-weight: 700; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .cal-grid td { vertical-align: top; border: 1px solid var(--border); padding: 6px; min-height: 90px; height: 100px; cursor: pointer; transition: background 0.12s; }
    .cal-grid td:hover { background: #F8FAFC; }
    .cal-grid td.other-month .day-num { color: var(--text-muted); }
    .cal-grid td.other-month { background: #FAFAFA; }
    .cal-grid td.today { background: var(--surface-tint); }
    .cal-grid td.today .day-num { background: var(--accent); color: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
    .day-num { font-size: 12.5px; font-weight: 600; color: var(--text-secondary); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .cal-event-pill { display: block; background: var(--accent); color: #fff; font-size: 10.5px; font-weight: 600; padding: 2px 6px; border-radius: 6px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; transition: background 0.12s; }
    .cal-event-pill:hover { background: var(--accent-hover); }

    .panel-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .panel-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 14px; font-weight: 700; }
    .panel-body { padding: 8px 0; }

    .event-row { display: flex; align-items: center; gap: 14px; padding: 12px 22px; border-bottom: 1px solid var(--border); transition: background 0.12s; }
    .event-row:last-child { border-bottom: none; }
    .event-row:hover { background: #F8FAFC; }
    .date-block { width: 42px; text-align: center; flex-shrink: 0; }
    .date-block .day { font-size: 20px; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .date-block .month { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .event-info { flex: 1; min-width: 0; }
    .event-title { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
    .event-meta { font-size: 11.5px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
    .event-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .act-btn { padding: 4px 10px; border-radius: 7px; font-size: 11.5px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text-secondary); transition: all 0.12s; }
    .act-btn:hover { background: var(--surface-tint); border-color: var(--accent); color: var(--accent); }
    .act-btn-danger { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }
    .act-btn-danger:hover { background: #FEE2E2; border-color: #FCA5A5; color: #B91C1C; }
    .empty-state { padding: 32px 22px; text-align: center; color: var(--text-muted); font-size: 13px; }

    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.45); z-index: 100; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--card); border-radius: var(--radius); width: 100%; max-width: 500px; margin: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden; }
    .modal-header { padding: 22px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 4px; border-radius: 6px; transition: color 0.12s, background 0.12s; line-height: 1; }
    .modal-close:hover { color: var(--text-primary); background: #F1F5F9; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12.5px; font-weight: 600; color: var(--text-secondary); }
    .form-input, .form-textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 13.5px; font-family: inherit; color: var(--text-primary); background: var(--canvas); transition: border-color 0.15s; outline: none; }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); background: #fff; }
    .form-textarea { resize: vertical; min-height: 70px; }
    .modal-footer { padding: 16px 24px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-primary); color: #fff; padding: 12px 18px; border-radius: 12px; font-size: 13.5px; font-weight: 500; z-index: 200; box-shadow: 0 6px 24px rgba(0,0,0,0.15); transform: translateY(80px); opacity: 0; transition: all 0.25s; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <span>Personal Assistant</span>
    <small>Command Center</small>
  </div>
  <nav class="sidebar-nav">
    <a href="/pa">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="/pa/tasks">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Tasks
    </a>
    <a href="/pa/calendar" class="active">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendar
      <span class="nav-badge" id="nav-cal-badge">0</span>
    </a>
    <a href="/pa/email">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      Email
    </a>
    <a href="/pa/social">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
      Social
    </a>
    <a href="/pa/fitness">
      <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      Fitness
    </a>
    <div class="sidebar-divider"></div>
  </nav>
  <div class="sidebar-back">
    <a href="/">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Home
    </a>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <p class="eyebrow">Personal Assistant</p>
      <h1 class="page-title">Calendar</h1>
    </div>
    <button class="btn btn-primary" id="new-event-btn">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      New event
    </button>
  </div>

  <div class="page-content">
    <div class="cal-card">
      <div class="cal-nav">
        <button class="btn-icon" id="prev-btn" aria-label="Previous month">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="cal-month-label" id="cal-month-label">Month Year</div>
        <button class="btn-icon" id="next-btn" aria-label="Next month">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <table class="cal-grid">
        <thead>
          <tr>
            <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
          </tr>
        </thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>

    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-title">Upcoming Events</span>
      </div>
      <div class="panel-body" id="upcoming-list">
        <div class="empty-state">Loading events...</div>
      </div>
    </div>
  </div>
</main>

<div class="modal-backdrop" id="event-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">New Event</span>
      <button class="modal-close" id="modal-close-btn" aria-label="Close">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-event-id" value="" />
      <div class="form-group">
        <label class="form-label" for="field-title">Title</label>
        <input class="form-input" id="field-title" type="text" placeholder="Event title" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label" for="field-start">Start</label>
          <input class="form-input" id="field-start" type="datetime-local" />
        </div>
        <div class="form-group">
          <label class="form-label" for="field-end">End</label>
          <input class="form-input" id="field-end" type="datetime-local" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="field-location">Location</label>
        <input class="form-input" id="field-location" type="text" placeholder="Optional location" />
      </div>
      <div class="form-group">
        <label class="form-label" for="field-desc">Description</label>
        <textarea class="form-textarea" id="field-desc" placeholder="Optional notes..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save Event</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let allEvents = [];
  let editingId = null;
  let currentYear, currentMonth;

  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();

  function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg, duration = 2800) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function fmtDatetimeLocal(dt) {
    if (!dt) return '';
    const d = new Date(dt);
    if (isNaN(d)) return '';
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function fmtDatePrefix(dateStr) {
    if (!dateStr) return { day: '--', month: '--', time: '' };
    const d = new Date(dateStr);
    if (isNaN(d)) return { day: '--', month: '--', time: '' };
    return { day: d.getDate(), month: MONTHS_SHORT[d.getMonth()], time: d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
  }

  function eventsForDate(y, m, d) {
    return allEvents.filter(ev => {
      const dt = new Date(ev.start_at);
      return !isNaN(dt) && dt.getFullYear() === y && dt.getMonth() === m && dt.getDate() === d;
    });
  }

  function renderCalendar() {
    document.getElementById('cal-month-label').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
    const tbody = document.getElementById('cal-body');
    tbody.innerHTML = '';

    const firstDay = new Date(currentYear, currentMonth, 1);
    let startDow = firstDay.getDay() - 1;
    if (startDow < 0) startDow = 6;

    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

    let cells = [];
    for (let i = startDow - 1; i >= 0; i--) {
      cells.push({ day: daysInPrev - i, month: currentMonth - 1, year: currentYear, other: true });
    }
    for (let d = 1; d <= daysInMonth; d++) {
      cells.push({ day: d, month: currentMonth, year: currentYear, other: false });
    }
    let trailing = 1;
    while (cells.length % 7 !== 0) {
      cells.push({ day: trailing++, month: currentMonth + 1, year: currentYear, other: true });
    }

    for (let row = 0; row < cells.length / 7; row++) {
      const tr = document.createElement('tr');
      for (let col = 0; col < 7; col++) {
        const cell = cells[row * 7 + col];
        const td = document.createElement('td');
        const actualYear = cell.month < 0 ? cell.year - 1 : cell.month > 11 ? cell.year + 1 : cell.year;
        const actualMonth = ((cell.month % 12) + 12) % 12;
        const isToday = actualYear === now.getFullYear() && actualMonth === now.getMonth() && cell.day === now.getDate() && !cell.other;

        if (cell.other) td.classList.add('other-month');
        if (isToday) td.classList.add('today');

        const dayNum = document.createElement('div');
        dayNum.className = 'day-num';
        dayNum.textContent = cell.day;
        td.appendChild(dayNum);

        const evs = eventsForDate(actualYear, actualMonth, cell.day);
        evs.slice(0, 3).forEach(ev => {
          const pill = document.createElement('span');
          pill.className = 'cal-event-pill';
          pill.textContent = ev.title;
          pill.dataset.id = ev.id;
          pill.addEventListener('click', e => { e.stopPropagation(); openModal(ev); });
          td.appendChild(pill);
        });
        if (evs.length > 3) {
          const more = document.createElement('span');
          more.style.cssText = 'font-size:10px;color:var(--text-muted);padding:0 4px;';
          more.textContent = `+${evs.length - 3} more`;
          td.appendChild(more);
        }

        td.addEventListener('click', () => {
          const d = new Date(actualYear, actualMonth, cell.day, 9, 0);
          openModalWithDate(d);
        });
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  }

  function renderUpcoming() {
    const el = document.getElementById('upcoming-list');
    const upcoming = allEvents
      .filter(ev => new Date(ev.start_at) >= now)
      .sort((a,b) => new Date(a.start_at) - new Date(b.start_at))
      .slice(0, 20);

    document.getElementById('nav-cal-badge').textContent = upcoming.length;

    if (upcoming.length === 0) {
      el.innerHTML = '<div class="empty-state">No upcoming events.</div>';
      return;
    }

    el.innerHTML = upcoming.map(ev => {
      const { day, month, time } = fmtDatePrefix(ev.start_at);
      const loc = ev.location ? ` &middot; ${escHtml(ev.location)}` : '';
      return `<div class="event-row">
        <div class="date-block"><div class="day">${day}</div><div class="month">${month}</div></div>
        <div class="event-info">
          <div class="event-title">${escHtml(ev.title)}</div>
          <div class="event-meta">${time}${loc}</div>
        </div>
        <div class="event-actions">
          <button class="act-btn" data-id="${ev.id}" data-action="edit">Edit</button>
          <button class="act-btn act-btn-danger" data-id="${ev.id}" data-action="delete">Delete</button>
        </div>
      </div>`;
    }).join('');
  }

  async function loadEvents() {
    try {
      const res = await fetch('/api/pa/calendar');
      if (!res.ok) throw new Error();
      const data = await res.json();
      allEvents = data.entries || [];
    } catch(e) {
      allEvents = [];
    }
    renderCalendar();
    renderUpcoming();
  }

  function openModal(ev) {
    editingId = ev ? ev.id : null;
    document.getElementById('modal-title').textContent = ev ? 'Edit Event' : 'New Event';
    document.getElementById('modal-event-id').value = ev ? ev.id : '';
    document.getElementById('field-title').value = ev ? ev.title : '';
    document.getElementById('field-start').value = ev ? fmtDatetimeLocal(ev.start_at || ev.startAt) : '';
    document.getElementById('field-end').value = ev ? fmtDatetimeLocal(ev.end_at || ev.endAt) : '';
    document.getElementById('field-location').value = ev ? (ev.location || '') : '';
    document.getElementById('field-desc').value = ev ? (ev.description || '') : '';
    document.getElementById('event-modal').classList.add('open');
    document.getElementById('field-title').focus();
  }

  function openModalWithDate(d) {
    editingId = null;
    document.getElementById('modal-title').textContent = 'New Event';
    document.getElementById('modal-event-id').value = '';
    document.getElementById('field-title').value = '';
    const pad = n => String(n).padStart(2,'0');
    const start = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:00`;
    const endD = new Date(d.getTime() + 3600000);
    const end = `${endD.getFullYear()}-${pad(endD.getMonth()+1)}-${pad(endD.getDate())}T${pad(endD.getHours())}:00`;
    document.getElementById('field-start').value = start;
    document.getElementById('field-end').value = end;
    document.getElementById('field-location').value = '';
    document.getElementById('field-desc').value = '';
    document.getElementById('event-modal').classList.add('open');
    document.getElementById('field-title').focus();
  }

  function closeModal() {
    document.getElementById('event-modal').classList.remove('open');
    editingId = null;
  }

  async function saveEvent() {
    const title = document.getElementById('field-title').value.trim();
    if (!title) { document.getElementById('field-title').focus(); return; }
    const payload = {
      title,
      startAt: document.getElementById('field-start').value || null,
      endAt: document.getElementById('field-end').value || null,
      location: document.getElementById('field-location').value.trim() || null,
      description: document.getElementById('field-desc').value.trim() || null
    };
    try {
      let res, data;
      if (editingId) {
        res = await fetch(`/api/pa/calendar/${editingId}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error();
        const json1 = await res.json();
        data = json1.event || json1;
        allEvents = allEvents.map(e => e.id === editingId ? data : e);
      } else {
        res = await fetch('/api/pa/calendar', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        if (!res.ok) throw new Error();
        const json2 = await res.json();
        data = json2.event || json2;
        allEvents.push(data);
      }
      renderCalendar();
      renderUpcoming();
      closeModal();
      showToast(editingId ? 'Event updated.' : 'Event created.');
    } catch(e) { showToast('Failed to save event.'); }
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event?')) return;
    try {
      const res = await fetch(`/api/pa/calendar/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      allEvents = allEvents.filter(e => e.id !== id);
      renderCalendar();
      renderUpcoming();
      showToast('Event deleted.');
    } catch(e) { showToast('Failed to delete event.'); }
  }

  document.getElementById('upcoming-list').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    const ev = allEvents.find(e => String(e.id) === String(id));
    if (btn.dataset.action === 'edit') openModal(ev);
    else if (btn.dataset.action === 'delete') deleteEvent(id);
  });

  document.getElementById('prev-btn').addEventListener('click', () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  });

  document.getElementById('new-event-btn').addEventListener('click', () => openModal(null));
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-save-btn').addEventListener('click', saveEvent);
  document.getElementById('event-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadEvents();
</script>
</body>
</html>
